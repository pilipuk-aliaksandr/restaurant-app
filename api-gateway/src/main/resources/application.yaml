server:
  port: 8082

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: http://localhost:8080
              predicates:
                - Path=/v1/orders/**
            - id: kitchen-service
              uri: http://localhost:8081
              predicates:
                - Path=/v1/kitchen/**